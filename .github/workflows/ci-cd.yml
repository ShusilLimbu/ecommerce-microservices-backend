name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to EC2 after CI (main only)
        type: boolean
        default: false
      branch:
        description: Branch to deploy on EC2
        required: false
        default: main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check services/auth-service/src/index.js
          node --check services/user-service/src/index.js
          node --check services/order-service/src/index.js
          node --check api-gateway/src/index.js
          node --check packages/shared/src/index.js

      - name: Validate Docker Compose
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production.example config

      - name: Build service images
        run: |
          docker compose -f docker-compose.yml build auth-service user-service order-service
          docker build -t ecommerce-gateway ./api-gateway

  deploy:
    name: Deploy to AWS EC2
    needs: ci
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          envs: DEPLOY_BRANCH
          script_stop: true
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.EC2_APP_DIR}}"
            export DEPLOY_BRANCH="${DEPLOY_BRANCH}"
            cd "${APP_DIR}"
            git remote -v
            chmod +x deploy/scripts/deploy.sh
            ./deploy/scripts/deploy.sh

      - name: Smoke test gateway (optional)
        env:
          HEALTH_URL: ${{ secrets.EC2_HEALTH_URL }}
        run: |
          if [ -z "${HEALTH_URL}" ]; then
            echo "EC2_HEALTH_URL not set � skipping public health check"
            exit 0
          fi
          for i in $(seq 1 12); do
            if curl -sf "${HEALTH_URL}"; then
              echo "Health check passed: ${HEALTH_URL}"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed: ${HEALTH_URL}"
          exit 1


